<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light" />
<title>Q-Star Issue Manager — Live preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; background: #f8fafc; }
  #qfb-btn { position: fixed; right: 18px; bottom: 18px; z-index: 9999; display: inline-flex; align-items: center; gap: 8px;
    background: #1B205C; color: #fff; border: none; border-radius: 999px; padding: 10px 16px; font: 600 13px ui-sans-serif, system-ui, Segoe UI, Roboto, Arial;
    box-shadow: 0 6px 20px rgba(15,23,42,.25); cursor: pointer; }
  #qfb-btn:hover { background: #2a3170; }
  #qfb-btn .dot { width: 8px; height: 8px; border-radius: 999px; background: #FBB900; }
  #qfb-panel { position: fixed; right: 18px; bottom: 66px; z-index: 9999; width: 320px; max-width: calc(100vw - 36px);
    background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; box-shadow: 0 12px 36px rgba(15,23,42,.22); padding: 14px; display: none;
    font: 13px ui-sans-serif, system-ui, Segoe UI, Roboto, Arial; }
  #qfb-panel.open { display: block; }
  #qfb-panel h4 { margin: 0 0 2px; font-size: 14px; color: #0f172a; }
  #qfb-panel p { margin: 0 0 10px; color: #64748b; font-size: 12px; }
  #qfb-text { width: 100%; box-sizing: border-box; min-height: 92px; resize: vertical; border: 1px solid #cbd5e1; border-radius: 9px; padding: 8px 10px; font: inherit; outline: none; }
  #qfb-text:focus { border-color: #1B205C; box-shadow: 0 0 0 3px rgba(27,32,92,.12); }
  .qfb-row { display: flex; gap: 8px; margin-top: 10px; }
  .qfb-row button { flex: 1; border-radius: 9px; padding: 8px 10px; font: 600 13px ui-sans-serif, system-ui, Arial; cursor: pointer; border: 1px solid transparent; }
  .qfb-send { background: #1B205C; color: #fff; } .qfb-send:hover { background: #2a3170; }
  .qfb-copy { background: #fff; color: #334155; border-color: #cbd5e1; } .qfb-copy:hover { background: #f1f5f9; }
  #qfb-note { margin-top: 8px; font-size: 11px; color: #94a3b8; }
</style>
</head>

  <button id="qfb-btn"><span class="dot"></span>Feedback</button>
  <div id="qfb-panel">
    <h4>Share your feedback</h4>
    <p>This is a live preview of the Q-Star Issue Manager. Tell us what works, what's missing, or what's confusing.</p>
    <textarea id="qfb-text" placeholder="Your thoughts, ideas, or issues…"></textarea>
    <div class="qfb-row">
      <button class="qfb-send" id="qfb-send">Send via email</button>
      <button class="qfb-copy" id="qfb-copy">Copy</button>
    </div>
    <div id="qfb-note">Tip: use the "signed in as" picker (top bar) to preview Admin, Quality Manager, Task Owner and Reader. Your edits stay in your browser; ↻ resets the sample data.</div>
  </div>
  <script>
    (function () {
      var FEEDBACK_EMAIL = "quality.team@time-matters.com"; // >>> EDIT to the address that should receive feedback <<<
      var btn = document.getElementById('qfb-btn'), panel = document.getElementById('qfb-panel'), text = document.getElementById('qfb-text');
      btn.addEventListener('click', function () { panel.classList.toggle('open'); if (panel.classList.contains('open')) text.focus(); });
      document.getElementById('qfb-send').addEventListener('click', function () {
        var body = encodeURIComponent((text.value || '').trim() + "\n\n— Sent from the Q-Star live preview (" + location.href + ")");
        window.location.href = "mailto:" + FEEDBACK_EMAIL + "?subject=" + encodeURIComponent("Q-Star Issue Manager — feedback") + "&body=" + body;
      });
      document.getElementById('qfb-copy').addEventListener('click', function () {
        var t = (text.value || '').trim(); if (!t) return;
        (navigator.clipboard ? navigator.clipboard.writeText(t) : Promise.reject()).then(function(){ var b=document.getElementById('qfb-copy'); b.textContent='Copied'; setTimeout(function(){b.textContent='Copy';},1200); }).catch(function(){});
      });
    })();
  </script>
